<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
  <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16">
  <link rel="apple-touch-icon" href="/favicon-180x180.png">

  <meta charset="utf-8" />
  <title>Aldvar LLC | Federal Solutions & Analytics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Aldvar LLC provides federal support, analytics, staffing, consulting, and program delivery services for government and regulated clients." />

  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f172a;
      --card:#111c33;
      --muted:#94a3b8;
      --text:#e6edf7;
      --line:rgba(148,163,184,.22);
      --accent:#22c55e;
      --accent2:#38bdf8;
      --shadow: 0 14px 30px rgba(0,0,0,.45);
      --shadow2: 0 22px 50px rgba(0,0,0,.6);
      --radius: 16px;
      --max: 1100px;
    }

    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1100px 500px at 20% -10%, rgba(56,189,248,.18), transparent 60%),
                  radial-gradient(900px 500px at 80% 0%, rgba(34,197,94,.14), transparent 55%),
                  var(--bg);
      color:var(--text);
      line-height:1.5;
    }
    a{ color:inherit; text-decoration:none; }
    .container{ max-width:var(--max); margin:0 auto; padding:0 20px; }

    .nav{
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
      background: rgba(11,18,32,.65);
      border-bottom: 1px solid var(--line);
    }
    .nav-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 12px 0;
      gap: 14px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width: 220px;
    }
    .logo{
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(120,150,220,.22);
      background: linear-gradient(180deg, #07152d, #081733);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.02),
        0 0 0 1px rgba(120,150,220,.06),
        0 10px 20px rgba(0,0,0,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex: 0 0 auto;
      transition: transform .2s ease, box-shadow .25s ease, border-color .25s ease;
      animation: logoIntro .5s ease-out;
    }
    .logo img{
      width: 78%;
      height: 78%;
      object-fit: contain;
      filter: brightness(1.15) contrast(1.05);
      transition: transform .25s ease, filter .25s ease;
    }
    .brand:hover .logo{
      transform: translateY(-1px);
      border-color: rgba(140,170,235,.34);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.03),
        0 0 0 1px rgba(120,150,220,.08),
        0 0 18px rgba(90,130,220,.16),
        0 12px 24px rgba(0,0,0,.38);
    }
    .brand:hover .logo img{
      transform: scale(1.03);
      filter: brightness(1.2) contrast(1.06);
    }

    @keyframes logoIntro{
      from{
        opacity: 0;
        transform: translateY(6px) scale(.96);
      }
      to{
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .brand .name{
      display:flex;
      flex-direction:column;
      line-height:1.1;
    }
    .brand .name strong{ font-size: 14px; letter-spacing:.6px; }
    .brand .name span{ font-size: 12px; color: var(--muted); }

    .nav-links{
      display:flex;
      align-items:center;
      gap: 10px;
    }
    .nav-links a{
      font-size: 12.5px;
      letter-spacing: .2px;
      color: rgba(230,237,247,.9);
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid transparent;
      transition: .2s ease;
      white-space: nowrap;
    }
    .nav-links a:hover{
      background: rgba(255,255,255,.04);
      border-color: rgba(148,163,184,.18);
      transform: translateY(-1px);
    }
    .nav-cta{
      display:flex;
      align-items:center;
      gap: 8px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid rgba(148,163,184,.22);
      background: rgba(17,28,51,.55);
      color: var(--text);
      cursor:pointer;
      transition: .2s ease;
    }
    .btn:hover{ transform: translateY(-2px); box-shadow: var(--shadow); }
    .btn.primary{
      border-color: rgba(34,197,94,.35);
      background: linear-gradient(135deg, rgba(34,197,94,.22), rgba(56,189,248,.14));
    }
    .menu-btn{ display:none; }

    .hero{ padding: 84px 0 36px; }
    .hero-grid{
      display:grid;
      grid-template-columns: 1.3fr .7fr;
      gap: 26px;
      align-items:stretch;
    }
    .hero-card{
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(15,23,42,.75), rgba(17,28,51,.45));
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--shadow);
      padding: 34px;
      position: relative;
      overflow: hidden;
    }
    .hero-card:before{
      content:"";
      position:absolute;
      inset:-2px;
      background: radial-gradient(800px 260px at 30% 0%, rgba(56,189,248,.18), transparent 65%),
                  radial-gradient(700px 240px at 70% 10%, rgba(34,197,94,.16), transparent 65%);
      pointer-events:none;
      opacity:.9;
    }
    .hero-card > *{ position: relative; }

    .badge{
      display:inline-flex;
      align-items:center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(56,189,248,.25);
      background: rgba(17,28,51,.55);
      color: rgba(230,237,247,.92);
      font-size: 12px;
      letter-spacing: .4px;
      margin-bottom: 14px;
    }
    .dot{
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent2);
      box-shadow: 0 0 0 4px rgba(56,189,248,.18);
    }
    h1{
      margin: 0 0 12px 0;
      font-size: 46px;
      line-height: 1.08;
      letter-spacing: .2px;
    }
    .sub{
      margin: 0 0 22px 0;
      color: rgba(148,163,184,.95);
      font-size: 16px;
      max-width: 62ch;
    }
    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap: 12px;
      margin-top: 8px;
    }
    .hero-actions .btn{ padding: 12px 16px; }

    .trust{
      margin-top: 20px;
      display:flex;
      flex-wrap:wrap;
      gap: 10px;
      color: rgba(148,163,184,.95);
      font-size: 12px;
    }
    .pill{
      border: 1px solid rgba(148,163,184,.2);
      background: rgba(17,28,51,.35);
      padding: 8px 10px;
      border-radius: 999px;
    }

    .hero-side{
      border: 1px solid var(--line);
      background: rgba(17,28,51,.35);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--shadow);
      padding: 22px;
      display:flex;
      flex-direction:column;
      gap: 14px;
    }
    .kpi{
      border: 1px solid rgba(148,163,184,.18);
      border-radius: var(--radius);
      padding: 14px;
      background: rgba(15,23,42,.55);
    }
    .kpi strong{ display:block; font-size: 18px; }
    .kpi span{ display:block; font-size: 12px; color: var(--muted); margin-top: 4px; }

    section{ scroll-margin-top: 84px; }
    .section{ padding: 36px 0 30px; }
    .section h2{
      margin: 0 0 10px;
      font-size: 26px;
      letter-spacing:.2px;
    }
    .section p.lead{
      margin: 0 0 18px;
      color: rgba(148,163,184,.95);
      max-width: 80ch;
    }

    .grid-container{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px;
      margin-top: 18px;
    }
    .box{
      grid-column: span 4;
      border-radius: var(--radius);
      border: 1px solid rgba(148,163,184,.18);
      background: linear-gradient(180deg, rgba(17,28,51,.55), rgba(15,23,42,.55));
      box-shadow: 0 10px 22px rgba(0,0,0,.45);
      padding: 20px;
      transition: .25s ease;
      position:relative;
      overflow:hidden;
      min-height: 148px;
    }
    .box:before{
      content:"";
      position:absolute;
      inset:-2px;
      background: radial-gradient(500px 220px at 20% 0%, rgba(56,189,248,.14), transparent 60%),
                  radial-gradient(520px 220px at 80% 10%, rgba(34,197,94,.12), transparent 62%);
      opacity:.65;
      pointer-events:none;
    }
    .box > *{ position:relative; }
    .box:hover{
      transform: translateY(-8px);
      box-shadow: var(--shadow2);
      border-color: rgba(56,189,248,.25);
    }
    .box h3{ margin: 0 0 8px; font-size: 16px; letter-spacing:.2px; }
    .box p{ margin: 0; color: rgba(148,163,184,.95); font-size: 13px; }
    .tag{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      font-size: 12px;
      color: rgba(230,237,247,.9);
      margin-top: 14px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,.2);
      background: rgba(11,18,32,.35);
    }
    .tag b{
      display:inline-block;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(34,197,94,.14);
    }

    .contact-wrap{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 18px;
    }
    .panel{
      border-radius: calc(var(--radius) + 4px);
      border: 1px solid rgba(148,163,184,.18);
      background: rgba(17,28,51,.35);
      box-shadow: var(--shadow);
      padding: 22px;
    }
    form{ display:grid; gap: 12px; margin-top: 6px; }
    label{ font-size: 12px; color: rgba(148,163,184,.95); }
    input, textarea, select{
      width: 100%;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.22);
      background: rgba(15,23,42,.55);
      color: var(--text);
      outline: none;
      transition: .2s ease;
      font-size: 14px;
    }
    input:focus, textarea:focus, select:focus{
      border-color: rgba(56,189,248,.45);
      box-shadow: 0 0 0 4px rgba(56,189,248,.12);
    }
    textarea{ min-height: 120px; resize: vertical; }
    .form-row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .note{ font-size: 12px; color: rgba(148,163,184,.95); margin-top: 10px; }
    .mini{
      display:grid;
      gap: 10px;
      margin-top: 10px;
      font-size: 13px;
      color: rgba(148,163,184,.95);
    }
    .mini strong{ color: rgba(230,237,247,.92); font-weight: 600; }

    .footer{
      padding: 28px 0;
      border-top: 1px solid var(--line);
      color: rgba(148,163,184,.9);
      font-size: 12px;
      text-align:center;
      margin-top: 30px;
      background: rgba(11,18,32,.35);
    }

    @media (max-width: 920px){
      .hero-grid{ grid-template-columns: 1fr; }
      .contact-wrap{ grid-template-columns: 1fr; }
      .box{ grid-column: span 6; }
      h1{ font-size: 40px; }
    }
    @media (max-width: 640px){
      .nav-links{ display:none; }
      .menu-btn{ display:inline-flex; }
      .box{ grid-column: span 12; }
      .hero{ padding-top: 58px; }
      h1{ font-size: 34px; }
      .form-row{ grid-template-columns: 1fr; }
      .brand{ min-width: auto; }
    }

    .mobile-menu{
      display:none;
      border-top: 1px solid var(--line);
      padding: 12px 0 16px;
    }
    .mobile-menu.open{ display:block; }
    .mobile-menu a{
      display:block;
      padding: 10px 10px;
      border-radius: 10px;
      color: rgba(230,237,247,.92);
      border: 1px solid transparent;
    }
    .mobile-menu a:hover{
      background: rgba(255,255,255,.04);
      border-color: rgba(148,163,184,.18);
    }
  </style>
</head>
<body>

</body>
</html>
